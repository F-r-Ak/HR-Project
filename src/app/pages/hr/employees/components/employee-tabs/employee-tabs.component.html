<div class="page-wrapper">
    <p-steps [model]="steps" [(activeIndex)]="activeStep" [readonly]="false"></p-steps>
    <div class="mt-4">
        @if (activeStep === 0) {
            <app-add-edit-person (personSubmitted)="onPersonIdChange($event); onPersonSubmitted()"></app-add-edit-person>
        }
        @if (activeStep === 1) {
            <app-add-edit-employment (employmentSubmitted)="onEmploymentSubmitted()"></app-add-edit-employment>
        }
        @if (activeStep === 2) {
            <app-add-edit-family></app-add-edit-family>
        }
    </div>
</div>
