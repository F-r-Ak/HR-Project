<p-card>
    <form [formGroup]="form">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div class="flex flex-col gap-1">
                <label>{{ 'نوع الوثيقة' }}</label>
                <app-prime-autocomplete
                    [formGroup]="form"
                    controlName="documentTypeId"
                    field="nameAr"
                    [selectedOption]="selectedDocumentType"
                    [getMethod]="documentTypesService.getDropDown.bind(documentTypesService)"
                    (onSelect)="onLookupSelect('documentTypeId', 'selectedDocumentType', $event)"
                    (onClear)="onLookupClear('documentTypeId', 'selectedDocumentType')"
                />
            </div>

            <app-prime-input-text [formGroup]="form" controlName="documentNumber"  contentType="number" label="رقم الوثيقة" />
        </div>

        <!-- Attachments -->
        <div class="mb-4">
            <label class="block mb-2 font-medium">المرفقات</label>

            <!-- Upload area -->
            <div class="upload-area border-dashed border-2 border-gray-300 rounded p-4 text-center cursor-pointer mb-3"
                 (click)="fileInput.click()">
                <i class="pi pi-upload text-2xl text-gray-400 mb-2 block"></i>
                <span class="text-gray-500">انقر لاختيار الملفات أو اسحبها هنا</span>
                <input #fileInput type="file" multiple class="hidden" (change)="onFileChange($event)" />
            </div>

            <!-- Existing attachments (edit mode) -->
            @if (existingAttachments.length) {
                <div class="mb-2">
                    <span class="text-sm text-gray-500 mb-1 block">الملفات الحالية</span>
                    @for (att of existingAttachments; track att.id) {
                        <div class="flex items-center justify-between border rounded px-3 py-2 mb-2 bg-white">
                            <div class="flex items-center gap-2">
                                <i [class]="getFileIcon(att.name)" class="text-lg"></i>
                                <span class="text-sm truncate max-w-xs">{{ att.name }}</span>
                            </div>
                            <i class="pi pi-trash text-red-500 cursor-pointer" (click)="removeExistingAttachment(att)"></i>
                        </div>
                    }
 </div>
            }

            <!-- Newly selected files -->
            @if (selectedFiles.length) {
                <div>
                    <span class="text-sm text-gray-500 mb-1 block">الملفات المختارة</span>
                    @for (file of selectedFiles; track $index) {
                        <div class="flex items-center justify-between border rounded px-3 py-2 mb-2 bg-white">
                            <div class="flex items-center gap-2">
                                <i [class]="getFileIcon(file.name)" class="text-lg"></i>
                                <span class="text-sm truncate max-w-xs">{{ file.name }}</span>
                            </div>
                            <i class="pi pi-times text-red-500 cursor-pointer" (click)="removeNewFile($index)"></i>
                        </div>
                    }
                </div>
            }
        </div>

        <app-submit-buttons (submit)="onSubmit()" (cancel)="onCancel()" [isSubmitDisabled]="form.invalid" />
    </form>
</p-card>
