<div class="page-wrapper">
    <p-card class="px-4 pt-2 pb-4 m-0">
        @if (form) {
            <form method="post" class="row" [formGroup]="form">
                    <div class="col-lg-6">
                    <label class="mb-2">{{ 'الصلاحية' }}</label>
                    <app-prime-autocomplete [field]="'nameAr'" [selectedOption]="selectedRole"
                        [suggestions]="filteredRoles" [formGroup]="form" (onSelect)="onRoleSelect($event)"
                        [lazy]="false" (handleMethod)="getRoles($event)"></app-prime-autocomplete>
                </div>
            
            </form>
        }
    </p-card>
    @if (form) {
        <app-submit-buttons [isSubmitDisabled]="form.invalid" [submitButtonText]="pageType === 'add' ? 'ACTIONS.SUBMIT' : 'ACTIONS.SAVE'" (submit)="submit()" (cancel)="closeDialog()"> </app-submit-buttons>
    }
</div>
